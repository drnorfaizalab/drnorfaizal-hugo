{{/*
  Instagram embed shortcode
  Usage: {{< instagram url="https://www.instagram.com/p/POST_CODE/" >}}
  Params:
    url - Full Instagram post URL (required)
*/}}
{{ $url := .Get "url" | default (.Get 0) }}
{{ if $url }}
<div class="social-embed social-embed-instagram">
  <div class="social-embed-header">
    <span class="social-platform-badge social-platform-instagram">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
      </svg>
      Instagram
    </span>
  </div>
  <div class="social-embed-instagram-container">
    <blockquote
      class="instagram-media"
      data-instgrm-captioned
      data-instgrm-permalink="{{ $url }}"
      data-instgrm-version="14"
      style="background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); max-width:540px; min-width:326px; width:99.375%; width:-webkit-calc(100% - 2px); width:calc(100% - 2px);">
      <div style="padding:16px;">
        <a href="{{ $url }}" target="_blank" rel="noopener noreferrer"
          style="background:#FFFFFF; line-height:0; padding:0 0; text-align:center; text-decoration:none; width:100%;">
          View this post on Instagram
        </a>
      </div>
    </blockquote>
    <script async src="//www.instagram.com/embed.js"></script>
  </div>
  <div class="social-embed-footer">
    <a href="{{ $url }}" target="_blank" rel="noopener noreferrer" class="social-embed-link">
      View on Instagram →
    </a>
  </div>
</div>
{{ else }}
<!-- instagram shortcode: missing url parameter -->
{{ end }}
