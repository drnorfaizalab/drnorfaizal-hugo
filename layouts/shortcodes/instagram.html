{{/* instagram shortcode
  Usage: {{< instagram "POST_ID" >}}
     or: {{< instagram url="https://www.instagram.com/p/POST_ID/" >}}
*/}}
{{ $raw := .Get "url" | default (.Get 0) }}
{{ $id := $raw | replaceRE `.*/p/([^/?]+).*` "$1" }}
{{ if $id }}
<div class="embed-instagram">
  <blockquote class="instagram-media"
    data-instgrm-captioned
    data-instgrm-permalink="https://www.instagram.com/p/{{ $id }}/"
    data-instgrm-version="14"
    style="background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin:1px; max-width:540px; min-width:326px; padding:0; width:calc(100% - 2px);">
  </blockquote>
  <script async src="https://www.instagram.com/embed.js"></script>
</div>
{{ end }}
