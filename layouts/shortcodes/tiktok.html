{{/*
  TikTok embed shortcode
  Usage: {{< tiktok url="https://www.tiktok.com/@username/video/VIDEO_ID" >}}
  Params:
    url - Full TikTok video URL (required)
*/}}
{{ $url := .Get "url" | default (.Get 0) }}
{{ if $url }}
<div class="social-embed social-embed-tiktok">
  <div class="social-embed-header">
    <span class="social-platform-badge social-platform-tiktok">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.53V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
      </svg>
      TikTok
    </span>
  </div>
  <div class="social-embed-tiktok-container">
    <blockquote
      class="tiktok-embed"
      cite="{{ $url }}"
      data-video-id="{{ $url | replaceRE `.*/video/(\d+).*` "$1" }}"
      style="max-width:605px; min-width:325px;">
      <section>
        <a href="{{ $url }}" target="_blank" rel="noopener noreferrer">View this video on TikTok</a>
      </section>
    </blockquote>
    <script async src="https://www.tiktok.com/embed.js"></script>
  </div>
  <div class="social-embed-footer">
    <a href="{{ $url }}" target="_blank" rel="noopener noreferrer" class="social-embed-link">
      Watch on TikTok →
    </a>
  </div>
</div>
{{ else }}
<!-- tiktok shortcode: missing url parameter -->
{{ end }}
