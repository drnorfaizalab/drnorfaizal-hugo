- name: LyNN
  en: I am very satisfied with the service from the doctors & nurses at Tawakkal Hospital.
    I received the best service from the Nor Faizal Doctor Clinic and CA Ivy who were
    very helpful. Very efficient & gave very accurate explanations.
  bm: Saya sangat berpuashati dengan layanan dari doktor & nurse di Tawakkal Hospital.
    Saya mendapat layanan terbaik dari Klinik Doktor Nor Faizal dan CA Ivy yang sangat
    membantu. Sangat cekap & memberi penjelasan yang sgt tepat.
  stars: 5
- name: shahrir razli
  en: Paid a visit to KPJ Tawakkal for further diagnosis on my suspected Bell’s Palsy.
    From the moment I arrived, the staff were incredibly kind and helpful, especially
    En. Farhan at the lobby and Ivy from Dr. Nor Faizal’s clinic. The consultation
    and treatment went smoothly, and I truly appreciate the care I received. Please
    keep me in your prayers for a speedy recovery.
  bm: Saya telah melawat KPJ Tawakkal untuk diagnosis lanjut bagi saya yang disyaki
    menghidap Bell’s Palsy. Dari saat saya tiba, kakitangannya sangat baik dan membantu,
    terutamanya En. Farhan di lobi dan Ivy dari klinik Dr. Nor Faizal. Rundingan dan
    rawatan berjalan lancar, dan saya sangat menghargai penjagaan yang saya terima.
    Tolong doakan saya agar cepat sembuh.
  stars: 5
- name: Hasrina Jamil
  en: Best service. Satisfied with the service of doctors Dr Faizal, Dr Rizal, Dr
    Izma. Clear explanation. When I was in Carnation ward, the nurses were also good
    and very dedicated. Today, when I had a problem with insurance, one of the KPJ
    staff (Mr. Norazlina) came to approach and assist me.
  bm: Servis terbaik. Puas hati dengan perkhidmatan doktor Dr Faizal, Dr Rizal, Dr
    Izma. Penerangan yang jelas. Semasa saya di wad Carnation, jururawat juga baik
    dan sangat berdedikasi. Hari ini, apabila saya mengalami masalah insurans, salah
    seorang kakitangan KPJ (En. Norazlina) datang mendekati dan membantu saya.
  stars: 5
- name: Sheikh Mohammad Shaiff
  en: One of the best KPJ branch I've been to. Went to see Dr Nor Faizal.
  bm: Salah satu cawangan KPJ terbaik yang saya pernah pergi. Pergi jumpa Dr Nor Faizal.
  stars: 5
- name: ensignro ensignro
  en: OneGreat service! They accommodated my last-minute request with no issue. Dr.
    Nor Faizal and Ivy were really professional, and the doctor even let me borrow
    his book 😊 Super happy with the whole experience.
  bm: Perkhidmatan OneGreat! Mereka memenuhi permintaan saat akhir saya tanpa masalah.
    Dr Nor Faizal dan Ivy benar-benar profesional, malah doktor membenarkan saya meminjam
    bukunya 😊 Sangat gembira dengan keseluruhan pengalaman itu.
  stars: 5
- name: ahmad khusairi zainol
  en: Im having procedure for my back pain with Dr Nor Faizal, Alhamdulillah my pain
    instantly goes off after procedure. Thank you doktor! My best physio ever, julaiha
    adila, thank you for your attention and care during treatment session and i gain
    my mobility well after physio session. To nurses at ambrosia ward thank you for
    all of your care and service during my stay.
  bm: Saya menjalani prosedur untuk sakit belakang saya dengan Dr Nor Faizal, Alhamdulillah
    sakit saya serta-merta hilang selepas prosedur. Terima kasih doktor! Fisio terbaik
    saya, julaiha adila, terima kasih atas perhatian dan penjagaan anda semasa sesi
    rawatan dan saya mendapat mobiliti saya dengan baik selepas sesi fisio. Kepada
    jururawat di wad ambrosia terima kasih atas segala penjagaan dan perkhidmatan
    anda sepanjang saya berada.
  stars: 5
- name: JC L
  en: A big thank you to Dr Nor Faizal Ahmad Bahuri and Tawakkal Specialist Hospital
    team for my successful operation and hospitalisation stay. Dr Nor Faizal is very
    a passionate, friendly, cheerful and patience person. He had patiently explained
    the pre and post operation to me, answering in easy to understand language and
    examples. This is a rare personality among doctors nowadays. Conversations with
    him can see that he enjoys his work with confidence and it’s not just a daily
    job. Never seen a grumpy face from him. His social media platforms provide good
    information. Dr Faizal’s clinic assistant handled his patients efficiently in
    follow up visits & enquires. Nurses at the Camelia, Azalea, ICU wards were friendly,
    helpful and provided good emotional support. Physio team was a great team and
    gave comfort and encouragement. Coming to Tawakkal Specialist Hospital for treatment
    was by chance and I was impressed by the service and friendliness.
  bm: Terima kasih yang tidak terhingga kepada Dr Nor Faizal Ahmad Bahuri dan pasukan
    Hospital Pakar Tawakkal atas kejayaan saya menjalani pembedahan dan kemasukan
    ke hospital. Dr Nor Faizal seorang yang sangat bersemangat, peramah, ceria dan
    penyabar. Dia dengan sabar menjelaskan operasi pra dan pasca kepada saya, menjawab
    dalam bahasa dan contoh yang mudah difahami. Ini adalah personaliti yang jarang
    berlaku di kalangan doktor pada masa kini. Perbualan dengannya dapat melihat bahawa
    dia menikmati kerjanya dengan yakin dan ia bukan sekadar pekerjaan harian. Tak
    pernah nampak muka geram dari dia. Platform media sosialnya memberikan maklumat
    yang baik. Pembantu klinik Dr Faizal mengendalikan pesakitnya dengan cekap dalam
    lawatan & pertanyaan susulan. Jururawat di wad Camelia, Azalea, ICU ramah, membantu
    dan memberikan sokongan emosi yang baik. Pasukan Physio adalah pasukan yang hebat
    dan memberi keselesaan dan galakan. Datang ke Hospital Pakar Tawakkal untuk mendapatkan
    rawatan adalah secara kebetulan dan saya kagum dengan layanan dan keramahan.
  stars: 5
