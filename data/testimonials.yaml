- name: LyNN
  en: "I am very satisfied with the service from the doctors & nurses at Tawakkal Hospital. I received the best service from the Nor Faizal Doctor Clinic and CA Ivy who were very helpful. Very efficient & gave very accurate explanations."
  bm: "Saya sangat berpuashati dengan layanan dari doktor & nurse di Tawakkal Hospital. Saya mendapat layanan terbaik dari Klinik Doktor Nor Faizal dan CA Ivy yang sangat membantu. Sangat cekap & memberi penjelasan yang sgt tepat."
  stars: 5
- name: shahrir razli
  en: "Paid a visit to KPJ Tawakkal for further diagnosis on my suspected Bell’s Palsy. From the moment I arrived, the staff were incredibly kind and helpful, especially En. Farhan at the lobby and Ivy from Dr. Nor Faizal’s clinic. The consultation and treatment went smoothly, and I truly appreciate the care I received. Please keep me in your prayers for a speedy recovery."
  bm: "Saya telah melawat KPJ Tawakkal untuk diagnosis lanjut bagi saya yang disyaki menghidap Bell’s Palsy. Dari saat saya tiba, kakitangannya sangat baik dan membantu, terutamanya En. Farhan di lobi dan Ivy dari klinik Dr. Nor Faizal. Rundingan dan rawatan berjalan lancar, dan saya sangat menghargai penjagaan yang saya terima. Tolong doakan saya agar cepat sembuh."
  stars: 5
- name: Hasrina Jamil
  en: "Best service. Satisfied with the service of doctors Dr Faizal, Dr Rizal, Dr Izma. Clear explanation. When I was in Carnation ward, the nurses were also good and very dedicated. Today, when I had a problem with insurance, one of the KPJ staff (Mr. Norazlina) came to approach and assist me."
  bm: ""
  stars: 5
