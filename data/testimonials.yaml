- name: ahmad khusairi zainol
  en: "Im having procedure for my back pain with Dr Nor Faizal, Alhamdulillah my pain instantly goes off after procedure. Thank you doktor! My best physio ever, julaiha adila, thank you for your attention and care during treatment session and i gain my mobility well after physio session. To nurses at ambrosia ward thank you for all of your care and service during my stay."
