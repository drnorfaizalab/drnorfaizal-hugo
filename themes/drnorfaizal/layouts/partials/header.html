<header class="site-header">
  <div class="container">
    <nav class="flex-between">
      <a href="{{ "/" | relLangURL }}" class="nav-brand">
        Dr Nor Faizal
      </a>

      <ul class="nav-menu" id="nav-menu">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relLangURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>

      <div style="display:flex; align-items:center; gap:1rem;">
        {{ if .IsTranslated }}
        <div class="lang-switch" style="font-size: 0.8rem; font-weight: 500;">
          {{ range .AllTranslations }}
          <a href="{{ .Permalink }}" style="margin-right: 0.5rem; text-decoration: none; color: inherit; opacity: {{ if eq .Lang $.Lang }}1{{ else }}0.5{{ end }};">{{ .Language.LanguageName }}</a>
          {{ end }}
        </div>
        {{ end }}
<a href="https://www.kpjhealth.com.my/dr-nor-faizal-ahmad-bahuri" target="_blank" rel="noopener" class="btn btn-cta" style="font-size:0.875rem; padding:0.5rem 1.25rem;">
          {{ if eq .Lang "ms" }}Temujanji{{ else }}Book Now{{ end }}
        </a>

        <button class="nav-mobile-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      </div>
    </nav>
  </div>
</header>
