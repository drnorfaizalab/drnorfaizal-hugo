raw_thoughts: |
  5 simple steps you can do when having an migraine attack

  safety is the most important steps in getting or giving treatment.

  1. go to a safe space. park you car safely if you are driving, go to a quiet space wh you feel overwhelm.
  2. regulate breathing using box breathing method.
  3. take simple analgesia like paracetamol.
  4. cold compress neck and forehead if necessary.
  5. Call for help.

  be safe and call for help. 

  take action. simple 5 steps.
