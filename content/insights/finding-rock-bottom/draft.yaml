raw_thoughts: |
  This is about finding self when we are lost in life.

  Everyone will encounter this phase in life. Either as a challenge in finance, health, relationship, or purpose.

  We have to take a break. Step back. Pause. Let other things go and keep what is the most precious to you. As for me, my family first. 

  Family won't give up on each other. They connect and build one another, covers each others weakness and uses the strength as a unit. 

  Having to deliver the truth in my line of duty is taxing mentally. I had told a patient that his brain tumour is advancing beyond the surgical limit and I left the couple crying. 
  The patient faced death bravely. He passed within 6 months.

  Facing the truth is painful but, it is the first step in healing process. I accepted the fact that I am just a human being and mentally fatigued.
  I can smile now. Relieved.
  
  If you are lost in the ocean, stop searching the bottom of the sea. You will get loss in the darkness and may not able to get to the surface. 
  Float, swim to the shore, look at the sky and the stars for guidance. 
  Once you feel a hard surface on your feet, that is the point to start pushing and walking towards the promised land.
  
  Take a break. Huddle, regroup. restrategise. You need oxygen to move forward. Then execute the plan to the details. 
