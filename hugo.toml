baseURL = "https://drnorfaizal.com/"
languageCode = "en-us"
title = "Dr Nor Faizal - Consultant Neurosurgeon & Pain Management Specialist"
theme = "drnorfaizal"

# Params for templates and navigation
[params]
  # Metadata
  author = "Dr Nor Faizal Ahmad Bahuri"
  description = "Oxford-trained Neurosurgeon & Interventional Pain Specialist. Expert in brain & spinal tumour surgery, neurooncology, and minimally invasive pain management."
  
  # Contact Information
  clinic_name = "Tawakkal Specialist Hospital"
  clinic_address = "Jalan Pahang Barat, Kuala Lumpur, Malaysia"
  clinic_phone = "+603-4026 7777 ext 5099"
  clinic_whatsapp = "+60122895061"
  clinic_email = "drnfaizal@kpjtawakkal.com"
  
  # Social Media
  social_tiktok = "drnorfaizalbahuri"
  social_instagram = "drnorfaizalbahuri"
  social_youtube = "drnorfaizalbahuri"
  social_linkedin = "drnorfaizalbahuri"
  social_facebook = "drnorfaizalbahuri"
  
  # Analytics
  google_analytics_id = "G-KBGPKYML9T"
  cloudflare_analytics_token = ""
  
  # SEO
  defaultMetaDescription = "Expert neurooncology and pain management specialist. Brain & spinal tumour surgery. Oxford-trained. Precision care."
  keywords = "neurosurgeon, neurooncology, brain tumour, spinal tumour, pain management, Malaysia"
  
  # Sitemap
  enableSitemap = true
  
  # Theme colors
  primary_color = "#002147"
  secondary_color = "#d4a574"
  accent_color = "#e63946"
  background_light = "#f8f9fa"
  text_dark = "#0d1f3c"

# Multi-language configuration & Menus
[languages]
