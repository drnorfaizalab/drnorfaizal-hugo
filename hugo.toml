baseURL = "https://drnorfaizal.com/"
languageCode = "en-us"
title = "Dr Nor Faizal - Consultant Neurosurgeon & Pain Management Specialist"
theme = "drnorfaizal"

# -----------------------------------------------------------------------------
# SERVICES
# -----------------------------------------------------------------------------
[services]
  [services.googleAnalytics]
    ID = "G-KBGPKYML9T"

# -----------------------------------------------------------------------------
# SITE PARAMETERS
# -----------------------------------------------------------------------------
[params]
  # -- Identity & SEO --
  author = "Dr Nor Faizal Ahmad Bahuri"
  description = "Oxford-trained Neurosurgeon & Interventional Pain Specialist. Expert in brain & spinal tumour surgery, neurooncology, and minimally invasive pain management."
  defaultMetaDescription = "Expert neurooncology and pain management specialist. Brain & spinal tumour surgery. Oxford-trained. Precision care."
  keywords = "neurosurgeon, neurooncology, brain tumour, spinal tumour, pain management, Malaysia"
  
  # -- Contact Information --
  clinic_name = "Tawakkal Specialist Hospital"
  clinic_address = "Jalan Pahang Barat, Kuala Lumpur, Malaysia"
  clinic_phone = "+603-4026 7777 ext 5099"
  clinic_whatsapp = "+60122895061"
  clinic_email = "drnfaizal@kpjtawakkal.com"
  
  # -- Social Media --
  social_tiktok = "drnorfaizalbahuri"
  social_instagram = "drnorfaizalbahuri"
  social_youtube = "drnorfaizalbahuri"
  social_linkedin = "drnorfaizalbahuri"
  social_facebook = "drnorfaizalbahuri"
  
  # -- Theme & Design --
  enableSitemap = true
  primary_color = "#002147"
  secondary_color = "#d4a574"
  accent_color = "#e63946"
  background_light = "#f8f9fa"
  text_dark = "#0d1f3c"

# -----------------------------------------------------------------------------
# LANGUAGES & MENUS
# -----------------------------------------------------------------------------
[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    homePageTitle = "Consultant Neurosurgeon & Pain Specialist | Dr Nor Faizal | Brain - Head - Pain"
    
    [[languages.en.menus.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 10

    [[languages.en.menus.main]]
      identifier = "expertise"
      name = "Expertise"
      url = "/expertise/"
      weight = 20

    [[languages.en.menus.main]]
      identifier = "patients"
      name = "Patients"
      url = "/patients/"
      weight = 30

    [[languages.en.menus.main]]
      identifier = "insights"
      name = "Insights"
      url = "/insights/"
      weight = 40

    [[languages.en.menus.main]]
      identifier = "contact"
      name = "Contact"
      url = "/contact/"
      weight = 50

  [languages.bm]
    languageName = "Bahasa"
    weight = 2
    homePageTitle = "Pakar Bedah Saraf & Otak, Pain Specialist | Dr Nor Faizal | Otak - Kepala - Sakit"

    [[languages.bm.menus.main]]
      identifier = "about"
      name = "Tentang"
      url = "/about/"
      weight = 10

    [[languages.bm.menus.main]]
      identifier = "expertise"
      name = "Kepakaran"
      url = "/expertise/"
      weight = 20

    [[languages.bm.menus.main]]
      identifier = "patients"
      name = "Pesakit"
      url = "/patients/"
      weight = 30

    [[languages.bm.menus.main]]
      identifier = "insights"
      name = "Insights"
      url = "/insights/"
      weight = 40

    [[languages.bm.menus.main]]
      identifier = "contact"
      name = "Hubungi"
      url = "/contact/"
      weight = 50

# -----------------------------------------------------------------------------
# BUILD & TECHNICAL
# -----------------------------------------------------------------------------
[permalinks]
  insights = "/insights/:slug/"
  categories = "/category/:slug/"
  tags = "/tag/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "JSON", "RSS", "Sitemap", "ROBOTS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"

[markup.goldmark.renderer]
  unsafe = true
[markup.highlight]
  style = "monokai"
  lineNos = false

[privacy.googleAnalytics]
  respectDoNotTrack = true

[security.funcs]
  getenv = ['^HUGO_', '^CLOUDFLARE_']