# System & Build Configuration
[permalinks]
  # Format: folder_name = "/desired-url-path/:slug/"
  blog = "/blog/:slug/"
  kepakaran = "/expertise/:slug/"    # Binds content/kepakaran/ to domain.com/expertise/
  pesakit = "/patients/:slug/"        # Binds content/pesakit/ to domain.com/patients/
  
  # Taxonomies
  categories = "/category/:slug/"
  tags = "/tag/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "JSON", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"

[markup.goldmark.renderer]
  unsafe = true
[markup.highlight]
  style = "monokai"
  lineNos = false

[privacy.googleAnalytics]
  respectDoNotTrack = true
  anonymizeIP = true

[security.funcs]
  getenv = ['^HUGO_', '^CLOUDFLARE_']